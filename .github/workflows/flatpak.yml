name: Flatpak

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: gridge-x86_64.flatpak
          manifest-path: packaging/io.github.ScarletPachydermDev.Gridge.json

      - name: Create/update release and attach bundle
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          mv gridge-x86_64.flatpak "gridge-${version}-x86_64.flatpak"
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" ||
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
              --title "Gridge ${version}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" "gridge-${version}-x86_64.flatpak" --repo "${GITHUB_REPOSITORY}" --clobber
